<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera de Partículas Controlada por Manos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="loading">
        <h1>Iniciando Experiencia...</h1>
        <p>Por favor, permite el acceso a la cámara.</p>
    </div>

    <!-- Video element for MediaPipe (hidden or background) -->
    <video class="input_video" style="opacity: 0; position: absolute; top: 0; left: 0; z-index: -1;"></video>

    <!-- Canvas for Three.js -->
    <canvas id="output_canvas"></canvas>

    <div class="ui-overlay">
        <div class="status">Esperando detección de manos...</div>
        <div class="instructions">Zoom: Separa o junta tus manos</div>
    </div>

    <!-- Visual Debug Cursors -->
    <div id="hand-cursor-1" class="hand-cursor" style="display: none;"></div>
    <div id="hand-cursor-2" class="hand-cursor" style="display: none;"></div>

    <script src="script.js"></script>
</body>

</html>
